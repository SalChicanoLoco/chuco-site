<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Biblioteca · Sena's AI Collective</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,900;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --earth:  #1a1209;
  --warm:   #2a1f0e;
  --sand:   #f5ead8;
  --terr:   #c2603a;
  --gold:   #e8a825;
  --sage:   #6b8f5e;
  --sky:    #4a7fa5;
  --cream:  #fdf6ea;
  --ink:    #1c1410;
  --border: rgba(194,96,58,0.18);
  --glass:  rgba(42,31,14,0.78);
  --glow:   rgba(232,168,37,0.18);
  --serif:  'Fraunces', serif;
  --sans:   'DM Sans', sans-serif;
  --mono:   'DM Mono', monospace;
  --panel-w: clamp(520px, 42vw, 720px);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { background:radial-gradient(circle at 80% 0%, rgba(194,96,58,0.14), transparent 34%), var(--earth); color:var(--sand); font-family:var(--sans); font-size:15px; line-height:1.6; display:flex; flex-direction:column; }

/* ── MASTHEAD ── */
.masthead {
  background:var(--earth);
  border-bottom:2px solid var(--terr);
  padding:14px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  z-index:10;
}
.brand { display:flex; align-items:baseline; gap:10px; }
.brand-name { font-family:var(--serif); font-size:22px; font-weight:900; color:var(--gold); }
.brand-sub { font-family:var(--mono); font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(245,234,216,0.35); }
.lang-toggle { display:flex; border:1px solid rgba(194,96,58,0.35); border-radius:3px; overflow:hidden; }
.lt-btn { padding:5px 13px; font-family:var(--mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; background:transparent; border:none; color:rgba(245,234,216,0.4); cursor:pointer; transition:all 0.15s; }
.lt-btn.active { background:var(--terr); color:var(--cream); }

/* ── BODY LAYOUT: feed | panel ── */
.app-body { display:flex; flex:1; overflow:hidden; }

/* ── FEED ── */
.feed {
  flex:1;
  overflow-y:auto;
  padding:20px 24px 40px;
  transition:margin-right 0.3s ease;
}
.feed.panel-open { margin-right:calc(var(--panel-w) + 28px); }

/* ── FILTER BAR ── */
.filter-bar { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-bottom:20px; }
.filter-label { font-family:var(--mono); font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(245,234,216,0.3); }
.f-btn { padding:4px 12px; font-family:var(--mono); font-size:9px; letter-spacing:0.08em; text-transform:uppercase; border:1px solid rgba(245,234,216,0.12); background:transparent; color:rgba(245,234,216,0.4); cursor:pointer; border-radius:2px; transition:all 0.15s; }
.f-btn:hover { border-color:var(--terr); color:var(--terr); }
.f-btn.active { background:var(--terr); border-color:var(--terr); color:var(--cream); }

/* ── CARDS GRID ── */
.cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:14px; }

.card {
  background:var(--warm);
  border:1px solid rgba(245,234,216,0.07);
  border-top:2px solid var(--terr);
  border-radius:2px;
  padding:20px 18px 16px;
  cursor:pointer;
  transition:border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  display:flex;
  flex-direction:column;
  gap:8px;
  user-select:none;
}
.card:hover { border-color:var(--gold); border-top-color:var(--gold); transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,0.25); }
.card.active { border-color:var(--gold); border-top-color:var(--gold); background:#332510; }

.card-meta { display:flex; align-items:center; justify-content:space-between; }
.card-vol { font-family:var(--mono); font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(245,234,216,0.3); }
.card-series { font-family:var(--mono); font-size:8px; letter-spacing:0.1em; text-transform:uppercase; color:var(--terr); }
.card-title { font-family:var(--serif); font-size:16px; font-weight:600; color:var(--sand); line-height:1.3; }
.card-excerpt { font-size:12px; color:rgba(245,234,216,0.45); line-height:1.6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
.card-date { font-family:var(--mono); font-size:9px; color:rgba(245,234,216,0.2); }
.free-badge { font-family:var(--mono); font-size:8px; letter-spacing:0.08em; text-transform:uppercase; color:var(--sage); border:1px solid rgba(107,143,94,0.35); padding:2px 7px; border-radius:2px; }

/* ── DETAIL PANEL: modern editorial command sheet ── */
.panel {
  position:fixed;
  top:72px; right:16px; bottom:16px;
  width:var(--panel-w);
  height:auto;
  background:
    linear-gradient(145deg, rgba(245,234,216,0.08), transparent 38%),
    radial-gradient(circle at 18% 0%, rgba(232,168,37,0.16), transparent 32%),
    var(--glass);
  border:1px solid rgba(232,168,37,0.22);
  border-left:1px solid rgba(194,96,58,0.42);
  border-radius:24px;
  box-shadow:0 24px 80px rgba(0,0,0,0.46), 0 0 0 1px rgba(245,234,216,0.04) inset;
  backdrop-filter:blur(18px) saturate(1.18);
  display:flex;
  flex-direction:column;
  transform:translateX(calc(100% + 32px)) scale(0.985);
  opacity:0;
  transition:transform 0.28s cubic-bezier(.2,.8,.2,1), opacity 0.2s ease;
  z-index:20;
  overflow:hidden;
}
.panel::before { content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(90deg, rgba(232,168,37,0.22), transparent 18%); opacity:0.22; }
.panel.open { transform:translateX(0) scale(1); opacity:1; }

.panel-header {
  position:relative;
  padding:24px 26px 20px;
  border-bottom:1px solid rgba(245,234,216,0.09);
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:18px;
  flex-shrink:0;
}
.panel-vol { font-family:var(--mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
.panel-title { font-family:var(--serif); font-size:clamp(24px, 2.2vw, 36px); font-weight:900; color:var(--sand); line-height:1.05; text-wrap:balance; max-width:15ch; }
.panel-close { background:rgba(245,234,216,0.06); border:1px solid rgba(245,234,216,0.14); color:rgba(245,234,216,0.64); width:38px; height:38px; border-radius:999px; cursor:pointer; font-size:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:transform 0.15s, border-color 0.15s, color 0.15s, background 0.15s; }
.panel-close:hover { border-color:var(--gold); color:var(--gold); background:rgba(232,168,37,0.1); transform:rotate(6deg) scale(1.04); }

.panel-body { position:relative; flex:1; overflow-y:auto; padding:24px 26px 26px; display:flex; flex-direction:column; gap:18px; }

.panel-series-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.p-series, .p-free, .p-tag { border-radius:999px; }
.p-series { font-family:var(--mono); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:#9cc9e8; background:rgba(74,127,165,0.14); border:1px solid rgba(74,127,165,0.28); padding:4px 10px; }
.p-free { font-family:var(--mono); font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:#a8cf96; background:rgba(107,143,94,0.12); border:1px solid rgba(107,143,94,0.34); padding:4px 10px; }
.p-date { font-family:var(--mono); font-size:10px; color:rgba(245,234,216,0.42); }

.panel-excerpt { font-size:16px; color:rgba(245,234,216,0.82); line-height:1.85; max-width:64ch; border-left:0; padding:20px 20px 20px 22px; background:rgba(253,246,234,0.055); border:1px solid rgba(245,234,216,0.08); border-radius:18px; box-shadow:0 1px 0 rgba(245,234,216,0.05) inset; }
.panel-excerpt::first-letter { font-family:var(--serif); font-size:2.4em; line-height:0.82; color:var(--gold); padding-right:3px; }

.panel-tags { display:flex; flex-wrap:wrap; gap:7px; }
.p-tag { font-family:var(--mono); font-size:9px; letter-spacing:0.06em; color:rgba(245,234,216,0.48); border:1px solid rgba(245,234,216,0.12); padding:4px 9px; background:rgba(245,234,216,0.035); }

.panel-actions { margin-top:auto; padding-top:18px; border-top:1px solid rgba(245,234,216,0.09); }
.read-btn { display:block; width:100%; padding:14px 16px; background:linear-gradient(135deg, var(--terr), #d98143); border:1px solid rgba(232,168,37,0.34); color:var(--cream); font-family:var(--mono); font-size:11px; letter-spacing:0.13em; text-transform:uppercase; text-align:center; text-decoration:none; cursor:pointer; border-radius:999px; transition:transform 0.15s, box-shadow 0.15s, filter 0.15s; box-shadow:0 12px 30px rgba(194,96,58,0.22); }
.read-btn:hover { transform:translateY(-1px); filter:brightness(1.07); box-shadow:0 16px 38px rgba(194,96,58,0.3); }
.read-btn.disabled { background:rgba(245,234,216,0.08); border-color:rgba(245,234,216,0.1); color:rgba(245,234,216,0.3); cursor:default; pointer-events:none; box-shadow:none; }

/* ── STATES ── */
.state { padding:40px 24px; text-align:center; }
.state-dots { display:flex; gap:6px; justify-content:center; margin-bottom:10px; }
.state-dots span { width:7px; height:7px; border-radius:50%; background:var(--gold); opacity:0.2; animation:ld 1.4s ease-in-out infinite; }
.state-dots span:nth-child(2){animation-delay:.2s} .state-dots span:nth-child(3){animation-delay:.4s}
@keyframes ld{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
.state-text { font-family:var(--mono); font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(245,234,216,0.3); }

/* ── EN/ES ── */
.en { display:block; } .es { display:none; }
body.lang-es .en { display:none; } body.lang-es .es { display:block; }

/* ── MOBILE ── */
@media(max-width:900px){
  :root { --panel-w: calc(100vw - 24px); }
  .feed.panel-open { margin-right:0; }
  .panel { top:68px; right:12px; bottom:12px; width:var(--panel-w); border-radius:20px; }
}

@media(max-width:700px){
  .cards { grid-template-columns:1fr; }
  .masthead { padding:12px 16px; }
  .feed { padding:16px 16px 40px; }
  .panel-header, .panel-body { padding-left:20px; padding-right:20px; }
}

@media(prefers-reduced-motion:reduce){
  *, *::before, *::after { animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
}
</style>
</head>
<body id="page">

<script>
const WORKER_URL = 'https://biblioteca-api.salvadorsena.workers.dev';
const DATA_URL = `${WORKER_URL}/volumes`;
</script>

<header class="masthead">
  <div class="brand">
    <span class="brand-name">La Biblioteca</span>
    <span class="brand-sub">Sena's AI Collective</span>
  </div>
  <div class="lang-toggle">
    <button class="lt-btn active" id="btnEN" onclick="setLang('en')">EN</button>
    <button class="lt-btn"        id="btnES" onclick="setLang('es')">ES</button>
  </div>
</header>

<div class="app-body">

  <!-- ── FEED ── -->
  <div class="feed" id="feed">
    <div class="filter-bar" id="filterBar">
      <span class="filter-label en">Series:</span>
      <span class="filter-label es">Serie:</span>
      <button class="f-btn active" data-series="all">
        <span class="en">All</span><span class="es">Todos</span>
      </button>
    </div>
    <div class="cards" id="cards">
      <div class="state">
        <div class="state-dots"><span></span><span></span><span></span></div>
        <div class="state-text en">Loading volumes…</div>
        <div class="state-text es">Cargando…</div>
      </div>
    </div>
  </div>

  <!-- ── DETAIL PANEL ── -->
  <aside class="panel" id="panel" role="dialog" aria-modal="true">
    <div class="panel-header">
      <div>
        <div class="panel-vol" id="pVol"></div>
        <div class="panel-title" id="pTitle"></div>
      </div>
      <button class="panel-close" onclick="closePanel()" aria-label="Close">✕</button>
    </div>
    <div class="panel-body">
      <div class="panel-series-row" id="pMeta"></div>
      <div class="panel-excerpt" id="pExcerpt"></div>
      <div class="panel-tags" id="pTags"></div>
      <div class="panel-actions" id="pActions"></div>
    </div>
  </aside>

</div>

<script>
const SERIES_LABELS = {
  'Water Rights':          { en:'Water Rights',        es:'Derechos del Agua' },
  'Land Grant':            { en:'Land Grant',          es:'Mercedes de Tierra' },
  'Labor Rights':          { en:'Labor Rights',        es:'Derechos Laborales' },
  'Community Agriculture': { en:'Agriculture',         es:'Agricultura Comunitaria' },
  'Political Education':   { en:'Political Ed',        es:'Educación Política' },
  'Special Edition':       { en:'Special Edition',     es:'Edición Especial' },
};

let volumes     = [];
let activeSeries = 'all';
let activeId     = null;
let lang         = 'en';

/* ── INIT ── */
(function init() {
  const saved = localStorage.getItem('bib_lang');
  lang = saved || (navigator.language?.startsWith('es') ? 'es' : 'en');
  applyLang(true);
  bindCardInteractions();
  loadData();
})();

async function loadData() {
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    volumes = data.volumes || [];
    buildFilters();
    renderCards();
  } catch(e) {
    document.getElementById('cards').innerHTML =
      `<div class="state"><div class="state-text">Could not load — try refreshing.</div></div>`;
    console.error(e);
  }
}


function bindCardInteractions() {
  const grid = document.getElementById('cards');

  grid.addEventListener('click', event => {
    const card = event.target.closest('.card');
    if (!card || !grid.contains(card)) return;
    openPanel(card.dataset.id, card);
  });

  grid.addEventListener('keydown', event => {
    const card = event.target.closest('.card');
    if (!card || !grid.contains(card)) return;
    if (event.key === 'Enter' || event.key === ' ' || event.key === 'Spacebar') {
      event.preventDefault();
      openPanel(card.dataset.id, card);
    }
  });
}

/* ── FILTERS ── */
function buildFilters() {
  const bar  = document.getElementById('filterBar');
  const seen = [...new Set(volumes.map(v => v.series).filter(Boolean))];
  seen.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'f-btn';
    btn.dataset.series = s;
    const labels = SERIES_LABELS[s] || { en:s, es:s };
    btn.innerHTML = `<span class="en">${labels.en}</span><span class="es">${labels.es}</span>`;
    btn.onclick = () => filter(btn, s);
    bar.appendChild(btn);
  });
}

function filter(btn, series) {
  activeSeries = series;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  closePanel();
  renderCards();
}

/* ── CARDS ── */
function renderCards() {
  const grid = document.getElementById('cards');
  const vols = activeSeries === 'all' ? volumes : volumes.filter(v => v.series === activeSeries);

  if (!vols.length) {
    grid.innerHTML = `<div class="state"><div class="state-text">No volumes found.</div></div>`;
    return;
  }

  grid.innerHTML = vols.map(v => {
    const title   = lang === 'es' && v.titleES   ? v.titleES   : v.titleEN;
    const excerpt = lang === 'es' && v.excerptES ? v.excerptES : v.excerptEN;
    const volNum  = v.vol ? `Vol. ${String(v.vol).padStart(2,'0')}` : 'Special';
    const dateStr = v.date ? fmtDate(v.date) : '';
    const isActive = v.id === activeId ? ' active' : '';
    return `
      <div class="card${isActive}" data-id="${v.id}" role="button" tabindex="0">
        <div class="card-meta">
          <span class="card-vol">${volNum}</span>
          <span class="card-series">${v.series || ''}</span>
        </div>
        <div class="card-title">${title}</div>
        <div class="card-excerpt">${excerpt}</div>
        <div class="card-footer">
          <span class="card-date">${dateStr}</span>
          ${v.freeToShare ? `<span class="free-badge">Free</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

/* ── PANEL ── */
function openPanel(id, cardEl) {
  const v = volumes.find(x => x.id === id);
  if (!v) return;
  activeId = id;

  const es      = lang === 'es';
  const title   = es && v.titleES   ? v.titleES   : v.titleEN;
  const excerpt = es && v.excerptES ? v.excerptES : v.excerptEN;
  const volNum  = v.vol ? `Vol. ${String(v.vol).padStart(2,'0')}` : 'Special';
  const seriesLabel = SERIES_LABELS[v.series]?.[lang] || v.series;

  document.getElementById('pVol').textContent   = volNum;
  document.getElementById('pTitle').textContent = title;

  const meta = document.getElementById('pMeta');
  meta.innerHTML = [
    v.series   ? `<span class="p-series">${seriesLabel}</span>` : '',
    v.freeToShare ? `<span class="p-free">${es ? 'Libre de compartir' : 'Free to Share'}</span>` : '',
    v.date     ? `<span class="p-date">${fmtDate(v.date)}</span>` : '',
  ].join('');

  document.getElementById('pExcerpt').textContent = excerpt;

  const tags = document.getElementById('pTags');
  tags.innerHTML = v.tags
    ? v.tags.split(',').map(t => `<span class="p-tag">${t.trim()}</span>`).join('')
    : '';

  const readLabel = es ? 'Leer el número completo' : 'Read Full Issue';
  document.getElementById('pActions').innerHTML = v.url
    ? `<a class="read-btn" href="${v.url}" target="_blank" rel="noopener">${readLabel} →</a>`
    : `<span class="read-btn disabled">${es ? 'Página completa próximamente' : 'Full page coming soon'}</span>`;

  document.getElementById('panel').classList.add('open');
  document.getElementById('feed').classList.add('panel-open');

  // Highlight active card
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  const activeCard = cardEl || document.querySelector(`.card[data-id="${id}"]`);
  activeCard?.classList.add('active');
}

function closePanel() {
  activeId = null;
  document.getElementById('panel').classList.remove('open');
  document.getElementById('feed').classList.remove('panel-open');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

/* ── LANGUAGE ── */
function setLang(l) {
  lang = l;
  localStorage.setItem('bib_lang', l);
  applyLang(false);
  if (volumes.length) renderCards();
  if (activeId) openPanel(activeId);
}

function applyLang(init) {
  document.getElementById('page').className = lang === 'es' ? 'lang-es' : '';
  document.getElementById('btnEN').className = 'lt-btn' + (lang === 'en' ? ' active' : '');
  document.getElementById('btnES').className = 'lt-btn' + (lang === 'es' ? ' active' : '');
  document.documentElement.lang = lang;
}

function fmtDate(d) {
  try { return new Date(d).toLocaleDateString('en-US', {month:'short', year:'numeric'}); }
  catch { return d; }
}
</script>
</body>
</html>

name = "numara-voice"
main = "index.js"
compatibility_date = "2024-09-23"

# Secret (required):
# wrangler secret put OPENAI_KEY

# Optional abuse controls:
# wrangler secret put VOICE_ACCESS_TOKEN
# ALLOWED_ORIGINS = "https://docs.senacolectivo.com,https://senacolectivo.com,https://www.senacolectivo.com"
# ALLOW_NO_ORIGIN = "true" # only for CLI/server-to-server testing
# TTS_MODEL = "tts-1" # free-tier compatible default; use tts-1-hd only when quota allows
# TRANSCRIPTION_MODEL = "whisper-1" # low-cost transcription default
# MAX_TTS_CHARS = "1500"
# MAX_TRANSCRIBE_BYTES = "5242880"

# Public health check after deploy:
# curl https://numara-voice.salvadorsena.workers.dev/health

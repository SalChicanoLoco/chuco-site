name = "numara-alicia-snt-sync"
main = "sync_worker.js"
compatibility_date = "2024-09-23"

# Required secrets — set via wrangler secret put (never bake into this file):
#
#   AIRTABLE_PAT       — Airtable Personal Access Token with read+write on NUMARA-Alicia-SNT
#   AIRTABLE_BASE_ID   — Airtable base ID (starts with 'app...')
#   SYNC_ACCESS_TOKEN  — Bearer token required by sync clients
#
# To deploy (requires Salvador approval):
#   wrangler secret put AIRTABLE_PAT
#   wrangler secret put AIRTABLE_BASE_ID
#   wrangler secret put SYNC_ACCESS_TOKEN
#   wrangler deploy

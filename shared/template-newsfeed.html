<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- REPLACE: page title -->
<title>News Feed · <!-- REPLACE: Publication Name --></title>
<!-- REPLACE: meta description -->
<meta name="description" content="News and analysis from <!-- REPLACE: org name -->.">
<link rel="stylesheet" href="/shared/sena-system.css">
<style>
/* ── NEWS FEED LAYOUT ─────────────────────────────────────────
   Two-pane layout: left = article card list, right = article detail.
   On mobile: stacks to single column, detail pane slides in.

   Wire to your Cloudflare Worker by replacing the DATA_URL const
   in the <script> block below.
   ─────────────────────────────────────────────────────────── */

/* ── FILTER BAR ── */
.filter-bar {
  background:    var(--earth);
  border-bottom: 1px solid var(--border);
  padding:       12px 24px;
  display:       flex;
  gap:           8px;
  flex-wrap:     wrap;
  align-items:   center;
}

.filter-label {
  font-family:    var(--mono);
  font-size:      9px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color:          rgba(245,234,216,.3);
  margin-right:   8px;
}

.filter-btn {
  padding:        5px 14px;
  font-family:    var(--mono);
  font-size:      9px;
  letter-spacing: .1em;
  text-transform: uppercase;
  background:     transparent;
  border:         1px solid rgba(194,96,58,.25);
  color:          rgba(245,234,216,.4);
  cursor:         pointer;
  border-radius:  2px;
  transition:     all .15s;
}
.filter-btn:hover  { border-color: var(--terr); color: var(--terr); }
.filter-btn.active { background: var(--terr); border-color: var(--terr); color: var(--cream); }

/* ── TWO-PANE SHELL ── */
.feed-shell {
  display: flex;
  min-height: calc(100vh - 140px); /* subtract masthead + filter bar */
}

/* ── LEFT PANE — article list ── */
.feed-list {
  width:          360px;
  flex-shrink:    0;
  border-right:   1px solid var(--border);
  overflow-y:     auto;
  background:     var(--cream);
}

/* ── ARTICLE CARD ── */
.article-card {
  padding:       20px 20px 18px;
  border-bottom: 1px solid var(--border);
  cursor:        pointer;
  transition:    background .12s;
  position:      relative;
}
.article-card:hover     { background: rgba(194,96,58,.04); }
.article-card.selected  { background: rgba(194,96,58,.08); border-left: 3px solid var(--terr); padding-left: 17px; }

.article-card-series {
  font-family:    var(--mono);
  font-size:      8px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color:          var(--terr);
  margin-bottom:  6px;
}

.article-card-title {
  font-family:   var(--serif);
  font-size:     16px;
  font-weight:   700;
  color:         var(--ink);
  line-height:   1.3;
  margin-bottom: 6px;
}

.article-card-lede {
  font-size:   13px;
  color:       #5a4a3a;
  line-height: 1.65;
  display:     -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow:    hidden;
}

.article-card-meta {
  margin-top:     10px;
  display:        flex;
  align-items:    center;
  justify-content: space-between;
  gap:            8px;
}

.article-card-date {
  font-family:    var(--mono);
  font-size:      8px;
  letter-spacing: .1em;
  color:          rgba(26,18,9,.35);
  text-transform: uppercase;
}

.article-card-tags {
  display: flex;
  gap:     4px;
  flex-wrap: wrap;
}

.card-tag {
  font-family:    var(--mono);
  font-size:      7px;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding:        2px 7px;
  border:         1px solid var(--border);
  color:          rgba(26,18,9,.45);
}
.card-tag.hot { border-color: rgba(194,96,58,.4); color: var(--terr); }

/* Loading/empty states in list */
.feed-state {
  padding:     48px 24px;
  text-align:  center;
  font-family: var(--mono);
  font-size:   10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color:       rgba(26,18,9,.3);
}

/* ── RIGHT PANE — article detail ── */
.feed-detail {
  flex: 1;
  overflow-y: auto;
  background: var(--cream);
}

/* Empty / placeholder state */
.detail-placeholder {
  display:         flex;
  flex-direction:  column;
  align-items:     center;
  justify-content: center;
  height:          100%;
  min-height:      400px;
  gap:             16px;
  color:           rgba(26,18,9,.2);
}
.detail-placeholder-icon {
  font-size:   32px;
  opacity:     .3;
}
.detail-placeholder-text {
  font-family:    var(--mono);
  font-size:      10px;
  letter-spacing: .15em;
  text-transform: uppercase;
}

/* ── ARTICLE DETAIL CONTENT ── */
.detail-cover {
  background:    var(--warm);
  padding:       40px 36px 32px;
  border-bottom: 2px solid var(--border);
}

.detail-vol-id {
  font-family:    var(--mono);
  font-size:      9px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color:          var(--terr);
  margin-bottom:  10px;
}

.detail-h1 {
  font-family:   var(--serif);
  font-size:     clamp(24px, 3.5vw, 36px);
  font-weight:   900;
  color:         var(--sand);
  line-height:   1.15;
  margin-bottom: 10px;
}
.detail-h1 em { color: var(--gold); font-style: italic; }

.detail-sub {
  font-family:   var(--serif);
  font-size:     16px;
  font-weight:   300;
  color:         rgba(245,234,216,.5);
  margin-bottom: 20px;
  line-height:   1.4;
}

.detail-lede {
  font-size:    14px;
  color:        rgba(245,234,216,.65);
  line-height:  1.8;
  border-left:  3px solid var(--terr);
  padding-left: 14px;
  max-width:    560px;
}

.detail-tags {
  display:    flex;
  flex-wrap:  wrap;
  gap:        6px;
  margin-top: 20px;
}

.detail-body {
  max-width: 680px;
  margin:    0 auto;
  padding:   36px 36px 64px;
}

.detail-body .body-text { color: #3a2c1e; }

.detail-link-out {
  display:         inline-block;
  margin-top:      24px;
  padding:         10px 22px;
  background:      var(--terr);
  color:           var(--cream);
  font-family:     var(--mono);
  font-size:       10px;
  letter-spacing:  .12em;
  text-transform:  uppercase;
  text-decoration: none;
  border-radius:   2px;
  transition:      background .15s;
}
.detail-link-out:hover { background: #a8472a; }

/* ── MOBILE: stack panes ── */
@media (max-width: 720px) {
  .feed-shell {
    flex-direction: column;
  }

  .feed-list {
    width:     100%;
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: 50vh;
    overflow-y: auto;
  }

  .feed-detail {
    min-height: 50vh;
  }

  .detail-cover { padding: 28px 20px 24px; }
  .detail-body  { padding: 28px 20px 48px; }

  .filter-bar { padding: 10px 16px; }
}
</style>
</head>
<!-- REPLACE: add theme-nms for NM Socialists, keep plain for La Biblioteca feed -->
<body id="page" class="theme-nms">

<!-- ── MASTHEAD ──────────────────────────────────────────────── -->
<!-- REPLACE: brand name, back-link href, back-link text -->
<nav class="mast">
  <a class="mast-brand" href="/"><!-- REPLACE: Publication Name --></a>
  <div class="mast-right">
    <!-- REPLACE: or remove back-link if this is the root page -->
    <a class="back-link" href="/">
      ← <span class="en-inline">Home</span><span class="es-inline">Inicio</span>
    </a>
    <div class="lang-toggle">
      <button class="lt-btn active" id="btnEN" onclick="setLang('en')">EN</button>
      <button class="lt-btn"        id="btnES" onclick="setLang('es')">ES</button>
    </div>
  </div>
</nav>

<!-- ── FILTER BAR ─────────────────────────────────────────────── -->
<!-- REPLACE: category/series filter buttons to match your data -->
<div class="filter-bar">
  <span class="filter-label en-inline">Filter</span>
  <span class="filter-label es-inline">Filtrar</span>
  <button class="filter-btn active" data-filter="all" onclick="applyFilter('all', this)">
    <span class="en-inline">All</span><span class="es-inline">Todo</span>
  </button>
  <!-- REPLACE: add/remove categories matching your Airtable Series field values -->
  <button class="filter-btn" data-filter="Organizing" onclick="applyFilter('Organizing', this)">
    <span class="en-inline">Organizing</span><span class="es-inline">Organización</span>
  </button>
  <button class="filter-btn" data-filter="Labor" onclick="applyFilter('Labor', this)">
    <span class="en-inline">Labor</span><span class="es-inline">Trabajo</span>
  </button>
  <button class="filter-btn" data-filter="Land Rights" onclick="applyFilter('Land Rights', this)">
    <span class="en-inline">Land Rights</span><span class="es-inline">Derechos de Tierra</span>
  </button>
  <button class="filter-btn" data-filter="Housing" onclick="applyFilter('Housing', this)">
    <span class="en-inline">Housing</span><span class="es-inline">Vivienda</span>
  </button>
  <button class="filter-btn" data-filter="Education" onclick="applyFilter('Education', this)">
    <span class="en-inline">Education</span><span class="es-inline">Educación</span>
  </button>
  <button class="filter-btn" data-filter="Special Edition" onclick="applyFilter('Special Edition', this)">
    <span class="en-inline">Special Edition</span><span class="es-inline">Edición Especial</span>
  </button>
</div>

<!-- ── TWO-PANE FEED ─────────────────────────────────────────── -->
<div class="feed-shell">

  <!-- LEFT PANE: article list -->
  <div class="feed-list" id="feedList">
    <div class="feed-state" id="feedState">
      <span class="en-inline">Loading articles…</span>
      <span class="es-inline">Cargando artículos…</span>
    </div>
  </div>

  <!-- RIGHT PANE: article detail -->
  <div class="feed-detail" id="feedDetail">
    <div class="detail-placeholder">
      <div class="detail-placeholder-icon">◈</div>
      <div class="detail-placeholder-text">
        <span class="en-inline">Select an article</span>
        <span class="es-inline">Selecciona un artículo</span>
      </div>
    </div>
  </div>

</div>

<!-- ── FOOTER ────────────────────────────────────────────────── -->
<!-- REPLACE: footer brand and meta -->
<footer class="pub-footer">
  <div class="footer-brand"><!-- REPLACE: Publication · Org Name --></div>
  <div class="footer-id en">
    <!-- REPLACE: EIN, license, etc. -->
    <!-- REPLACE: org name -->&nbsp;·&nbsp;CC BY-NC-SA 4.0&nbsp;·&nbsp;Free to Share
  </div>
  <div class="footer-id es">
    <!-- REPLACE: org name -->&nbsp;·&nbsp;CC BY-NC-SA 4.0&nbsp;·&nbsp;Libre de Compartir
  </div>
</footer>

<!-- ── SCRIPTS ───────────────────────────────────────────────── -->
<script>
/* ──────────────────────────────────────────────────────────────
   NEWS FEED CONTROLLER
   ──────────────────────────────────────────────────────────────
   REPLACE: DATA_URL with your Cloudflare Worker endpoint.
   Expected response shape:
   {
     "volumes": [
       {
         "id":        "recXXX",
         "vol":       1,
         "titleEN":   "Title in English",
         "titleES":   "Título en español",
         "series":    "Land Grant Series",
         "excerptEN": "Short excerpt...",
         "excerptES": "Extracto corto...",
         "url":       "https://github.com/.../vol1/",
         "date":      "2026-01-15",
         "tags":      "Land Grant, Genízaro",
         "freeToShare": true
       }
     ]
   }
   ────────────────────────────────────────────────────────────── */
const DATA_URL = '/biblioteca-worker/biblioteca-data.json'; /* REPLACE */

let allArticles  = [];
let activeFilter = 'all';
let activeLang   = 'en';

/* ── Fetch data ── */
async function loadFeed() {
  try {
    const res  = await fetch(DATA_URL);
    const data = await res.json();
    allArticles = (data.volumes || data.articles || []).reverse(); /* newest first */
    renderList(allArticles);
    /* Auto-select first */
    if (allArticles.length > 0) renderDetail(allArticles[0]);
  } catch (err) {
    document.getElementById('feedState').innerHTML =
      '<span class="en-inline">Could not load articles.</span>' +
      '<span class="es-inline">No se pudieron cargar los artículos.</span>';
    console.error('Feed load error:', err);
  }
}

/* ── Render article card list ── */
function renderList(articles) {
  const list = document.getElementById('feedList');
  if (articles.length === 0) {
    list.innerHTML = '<div class="feed-state">' +
      '<span class="en-inline">No articles found.</span>' +
      '<span class="es-inline">No se encontraron artículos.</span></div>';
    return;
  }

  list.innerHTML = articles.map((a, i) => {
    const title = activeLang === 'es' ? (a.titleES || a.titleEN) : a.titleEN;
    const lede  = activeLang === 'es' ? (a.excerptES || a.excerptEN) : a.excerptEN;
    const tags  = Array.isArray(a.tags) ? a.tags : (a.tags || '').split(',').map(t => t.trim()).filter(Boolean);
    const date  = a.date ? new Date(a.date).toLocaleDateString(activeLang === 'es' ? 'es-MX' : 'en-US', { month: 'short', year: 'numeric' }) : '';

    return `<div class="article-card${i === 0 ? ' selected' : ''}"
                 data-index="${i}"
                 onclick="selectArticle(${i})">
      <div class="article-card-series">${a.series || ''}</div>
      <div class="article-card-title">${title}</div>
      <div class="article-card-lede">${lede}</div>
      <div class="article-card-meta">
        <span class="article-card-date">${date}</span>
        <div class="article-card-tags">
          ${tags.slice(0, 2).map((t, ti) => `<span class="card-tag${ti === 0 ? ' hot' : ''}">${t}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Select and render detail ── */
function selectArticle(index) {
  /* Update selected card */
  document.querySelectorAll('.article-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`[data-index="${index}"]`);
  if (card) card.classList.add('selected');

  renderDetail(allArticles[index]);

  /* On mobile, scroll detail pane into view */
  if (window.innerWidth <= 720) {
    document.getElementById('feedDetail').scrollIntoView({ behavior: 'smooth' });
  }
}

/* ── Render article detail ── */
function renderDetail(article) {
  if (!article) return;

  const title  = activeLang === 'es' ? (article.titleES || article.titleEN) : article.titleEN;
  const lede   = activeLang === 'es' ? (article.excerptES || article.excerptEN) : article.excerptEN;
  const tags   = Array.isArray(article.tags) ? article.tags : (article.tags || '').split(',').map(t => t.trim()).filter(Boolean);
  const volStr = article.vol ? `Vol. ${String(article.vol).padStart(2, '0')}` : '';
  const dateStr = article.date ? new Date(article.date).toLocaleDateString(activeLang === 'es' ? 'es-MX' : 'en-US', { day: 'numeric', month: 'long', year: 'numeric' }) : '';

  const readLabel = activeLang === 'es' ? 'Leer artículo completo →' : 'Read full article →';
  const freeLabel = activeLang === 'es' ? 'Libre de compartir' : 'Free to Share';

  document.getElementById('feedDetail').innerHTML = `
    <div class="detail-cover">
      <div class="detail-vol-id">${[volStr, article.series, dateStr].filter(Boolean).join(' · ')}</div>
      <h2 class="detail-h1">${title}</h2>
      <div class="detail-lede">${lede}</div>
      <div class="detail-tags">
        ${tags.map((t, i) => `<span class="ctag${i < 2 ? ' hot' : ''}">${t}</span>`).join('')}
        ${article.freeToShare ? `<span class="ctag">${freeLabel}</span>` : ''}
      </div>
    </div>
    <div class="detail-body">
      <p class="body-text">${lede}</p>
      ${article.url
        ? `<a class="detail-link-out" href="${article.url}" target="_blank" rel="noopener">${readLabel}</a>`
        : ''}
    </div>
  `;
}

/* ── Filter ── */
function applyFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const filtered = filter === 'all'
    ? allArticles
    : allArticles.filter(a => (a.series || '').toLowerCase().includes(filter.toLowerCase()));
  renderList(filtered);
  if (filtered.length > 0) renderDetail(filtered[0]);
}

/* ── Bilingual toggle ── */
(function () {
  const saved = localStorage.getItem('bib_lang');
  const lang  = saved || (navigator.language?.startsWith('es') ? 'es' : 'en');
  if (lang === 'es') setLang('es', true);
})();

function setLang(l, init) {
  activeLang = l;
  /* Update body class — preserve theme-nms if present */
  const body = document.getElementById('page');
  body.className = body.className.replace(/\blang-es\b/, '').trim();
  if (l === 'es') body.className += ' lang-es';
  document.getElementById('btnEN').className = 'lt-btn' + (l === 'en' ? ' active' : '');
  document.getElementById('btnES').className = 'lt-btn' + (l === 'es' ? ' active' : '');
  if (!init) localStorage.setItem('bib_lang', l);
  document.documentElement.lang = l;

  /* Re-render with new language */
  if (allArticles.length > 0) {
    const filtered = activeFilter === 'all'
      ? allArticles
      : allArticles.filter(a => (a.series || '').toLowerCase().includes(activeFilter.toLowerCase()));
    renderList(filtered);
    renderDetail(filtered[0]);
  }
}

/* ── Boot ── */
loadFeed();
</script>
</body>
</html>
